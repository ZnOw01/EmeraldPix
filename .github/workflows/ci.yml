name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGES.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'backend/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGES.md'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: emeraldpix-dist-${{ github.sha }}
          path: dist/
          retention-days: 30
